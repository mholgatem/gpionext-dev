name: Build Rust Extension

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: armv7-unknown-linux-gnueabihf
            arch: armv7l
          - target: aarch64-unknown-linux-gnu
            arch: aarch64
          - target: x86_64-unknown-linux-gnu
            arch: x86_64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheel with maturin
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.target }}
          manylinux: off
          args: >
            --release
            --strip
            --manifest-path core/Cargo.toml
            --out dist
            --zig

      - name: Extract and rename .so
        run: |
          set -euo pipefail

          mkdir -p extracted

          WHL="$(find dist -name '*.whl' | head -n 1)"
          echo "Wheel: $WHL"

          python3 -m zipfile -e "$WHL" extracted

          SO="$(find extracted -name '*.so' | head -n 1)"
          echo "Shared object: $SO"

          cp "$SO" "dist/gpionext_core-${{ matrix.arch }}.so"

          ls -lh dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gpionext_core-${{ matrix.arch }}
          path: dist/gpionext_core-${{ matrix.arch }}.so

      - name: Attach binary to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/gpionext_core-${{ matrix.arch }}.so