name: Build Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        include:
          # Raspberry Pi 4/5, 64-bit OS
          - target: aarch64-unknown-linux-gnu
            artifact_name: gpionext_core-linux-aarch64.so

          # Raspberry Pi 2/3/4, 32-bit OS
          - target: armv7-unknown-linux-gnueabihf
            artifact_name: gpionext_core-linux-armv7.so

          # Optional: normal Linux PC
          - target: x86_64-unknown-linux-gnu
            artifact_name: gpionext_core-linux-x86_64.so

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: cross build --release --target ${{ matrix.target }}

      - name: Rename artifact
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/libgpionext_core.so dist/${{ matrix.artifact_name }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact_name }}
